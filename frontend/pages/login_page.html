<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../src/output.css" rel="stylesheet">
    <link rel="stylesheet" href="../src/global.css">
    <link rel="stylesheet" href="../src/style_login.css">
    <link rel="icon" href="../assets/images/logo-find-pets.svg">
    <title>Find Pets - Login</title>
</head>
<body>
    <header>
        <nav class="bg-white shadow border-gray-200 px-4 lg:px-6 py-2.5">
            <div class="flex flex-wrap justify-between items-center mx-auto max-w-screen-xl">
                <a href="../src/index.html" class="flex items-center">
                    <img src="../assets/images/logo-find-pets.svg" class="mr-3 h-6 sm:h-10" alt="Find Pets logo"/>
                    <span class="self-center text-xl font-semibold">Find Pets</span>
                </a>
                <div class="flex items-center gap-2">
                    <a href="./login_page.html" class="text-gray-800 hover:bg-gray-50 font-medium rounded-lg text-sm px-4 py-2">Log in</a>
                    <a href="./sign_up.html" class="text-white bg-blue-700 hover:bg-blue-800 font-medium rounded-lg text-sm px-4 py-2">Sign up</a>
                </div>
            </div>
        </nav>
    </header>

    <section class="flex flex-col md:flex-row h-screen items-center">
        <div class="hidden lg:block w-full md:w-1/2 xl:w-2/3 h-screen">
            <img src="../assets/images/photo-1478098711619-5ab0b478d6e6.avif" alt="" class="w-full h-full object-cover">
        </div>

        <div class="bg-white w-full md:max-w-md lg:max-w-full md:w-1/2 xl:w-1/3 h-screen px-6 lg:px-16 xl:px-12 flex items-center justify-center">
            <div class="w-full">
                <h1 class="color_text text-xl md:text-2xl font-bold leading-tight mt-12 md:mt-0">Iniciar sesión</h1>

                <div id="mensaje-error" class="hidden mt-4 msg-error"></div>

                <div class="mt-6 space-y-4">
                    <div>
                        <label class="block text-gray-700">Correo electrónico</label>
                        <input type="email" id="email" placeholder="Ingresa tu correo"
                            class="w-full px-4 py-3 rounded-lg bg-gray-200 mt-2 border focus:border-blue-500 focus:bg-white focus:outline-none">
                    </div>

                    <div>
                        <label class="block text-gray-700">Contraseña</label>
                        <input type="password" id="password" placeholder="Ingresa tu contraseña"
                            class="w-full px-4 py-3 rounded-lg bg-gray-200 mt-2 border focus:border-blue-500 focus:bg-white focus:outline-none">
                    </div>

                    <button onclick="login()" id="btn-login"
                        class="w-full block bg-[#1D4ED8] hover:bg-[#1e40af] text-white font-semibold rounded-lg px-4 py-3 mt-2">
                        Iniciar sesión
                    </button>
                </div>

                <p class="mt-6">¿No tienes cuenta? <a href="./sign_up.html" class="text-[#1D4ED8] font-semibold">Crear cuenta</a></p>
            </div>
        </div>
    </section>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../src/app.js"></script>
    <script>
        // Si ya está logueado, redirigir
        if (isLoggedIn()) window.location.href = '../src/index.html';

        // Enter en inputs
        ['email','password'].forEach(id => {
            document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
        });

        async function login() {
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('mensaje-error');
            errorDiv.classList.add('hidden');

            if (!email || !password) {
                errorDiv.textContent = 'Completa todos los campos.';
                errorDiv.classList.remove('hidden');
                return;
            }

            const btn = document.getElementById('btn-login');
            btn.disabled = true; btn.textContent = 'Ingresando...';

            const { ok, data } = await apiFetch('/login', {
                method: 'POST',
                body: JSON.stringify({ email, password })
            });

            btn.disabled = false; btn.textContent = 'Iniciar sesión';

            if (ok) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('nombre', data.nombre);
                localStorage.setItem('usuarioId', data.id);
                window.location.href = '../src/index.html';
            } else {
                errorDiv.textContent = data.error || 'Error al iniciar sesión';
                errorDiv.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
